apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
        - name: service-a
          image: hashicorp/http-echo:latest
          args:
            - "-text=hello from service-a"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: service-a-k8s
  namespace: dev
spec:
  selector:
    app: service-a
  ports:
    - port: 8080
      targetPort: 8080
