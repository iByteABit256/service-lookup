apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
        - name: service-b
          image: hashicorp/http-echo:latest
          args:
            - "-text=hello from service-b"
            - "-listen=:9090"
          ports:
            - containerPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: service-b-k8s
  namespace: dev
spec:
  selector:
    app: service-b
  ports:
    - port: 9090
      targetPort: 9090
